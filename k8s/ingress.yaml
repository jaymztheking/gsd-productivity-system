# Traefik Ingress (bundled with k3s)
#
# Add a DNS A record in Pi-hole:
#   gsd.home.lab -> 192.168.50.240  (Traefik MetalLB IP)
#
# n8n is shared — use the existing instance at n8n.home.lab
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gsd-ingress
  namespace: gsd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: gsd.home.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 3000

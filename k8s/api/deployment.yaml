apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: gsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: migrate
          image: jaymztheking/gsd-api:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gsd-secrets
                  key: DATABASE_URL
            - name: PYTHONPATH
              value: /app
      containers:
        - name: api
          image: jaymztheking/gsd-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gsd-secrets
                  key: DATABASE_URL
            - name: PYTHONPATH
              value: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

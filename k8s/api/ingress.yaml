apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gsd-api-ingress
  namespace: gsd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: gsd-strip-api-prefix@kubernetescrd
spec:
  rules:
    - host: gsd.home.lab
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000

# Build with the production Dockerfile (not Dockerfile.dev):
#   docker buildx build --platform linux/arm64 -t jaymztheking/gsd-ui:latest --push ./ui
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: gsd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: jaymztheking/gsd-ui:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
